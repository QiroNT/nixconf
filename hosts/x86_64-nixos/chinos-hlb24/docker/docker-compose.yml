name: nixconf

services:
  llama-swap:
    image: ghcr.io/mostlygeek/llama-swap:vulkan-non-root
    restart: unless-stopped
    command: --listen 0.0.0.0:11434
    environment:
      - LLAMA_CACHE=/cache
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./llama-swap/config.yaml:/app/config.yaml
      - llama-cache:/cache
    devices:
      - /dev/dri:/dev/dri
    depends_on:
      - llama-swap-init

  llama-swap-init:
    image: alpine
    restart: "no"
    entrypoint: |
      /bin/sh -c "chown 10001:10001 /cache"
    volumes:
      - llama-cache:/cache

  factorio:
    # image: factoriotools/factorio:stable
    image: factoriotools/factorio:2.0.73
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "34197:34197/udp"
    volumes:
      - /opt/factorio:/factorio
      # - ./factorio/map-gen-settings.json:/factorio/config/map-gen-settings.json
      # - ./factorio/map-settings.json:/factorio/config/map-settings.json
      - ./factorio/server-settings.json:/factorio/config/server-settings.json
      - ./factorio/server-adminlist.json:/factorio/config/server-adminlist.json
      - ./factorio/server-whitelist.json:/factorio/config/server-whitelist.json
    environment:
      # - GENERATE_NEW_SAVE=true
      - SAVE_NAME=se2
      - DLC_SPACE_AGE=elevated-rails quality

